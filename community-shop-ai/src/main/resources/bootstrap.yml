spring:
  application:
    name: ai-service # 1. 服务名，对应 Nacos 里的 Data ID
  profiles:
    active: dev # 2. 环境名
  cloud:
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858 # 控制台地址
        port: 8719 # 客户端监控端口，如果被占用会自动+1查找
    nacos:
      config:
        server-addr: 127.0.0.1:8848 # Nacos 地址
        file-extension: yaml # 配置文件后缀
        extension-configs:
          - data-id: common-dev.yaml
            refresh: true